<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
    <title>🏔️山河旅行记</title>
    <style>
      :root {
        --bg: #1a1a2e;
        --gold: #e2b04a;
        --text: #f0e6d3;
      }
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body {
        background: linear-gradient(135deg, #1a1a2e 0%, #16213e 40%, #1a1a2e 100%);
        display: flex; justify-content: center; align-items: center;
        min-height: 100vh; font-family: "Segoe UI", "PingFang SC", sans-serif;
        user-select: none; overflow: hidden;
        touch-action: manipulation;
      }
      .game-container {
        position: relative; display: flex; gap: 12px; align-items: stretch;
        background: rgba(22,33,62,0.7); border-radius: 24px; padding: 16px;
        box-shadow: 0 20px 60px rgba(0,0,0,0.5), 0 0 0 2px rgba(226,176,74,0.3);
        backdrop-filter: blur(10px); min-width: 1060px; width: fit-content; margin: 0 auto;
        transform-origin: center center; transition: transform 0.3s ease;
      }
      .board-wrapper {
        position: relative; width: 800px; height: 600px; border-radius: 16px;
        overflow: hidden; box-shadow: 0 10px 30px rgba(0,0,0,0.4), 0 0 0 3px rgba(226,176,74,0.25);
        background: radial-gradient(circle at center, #fef9f0, #f5ecd7, #e8d5b0);
      }
      canvas#bgCanvas { position: absolute; top:0; left:0; width:800px; height:600px; }
      canvas#gameCanvas { position: absolute; top:0; left:0; width:800px; height:600px; z-index:2; cursor:pointer; }
      .dice-3d-container { perspective:350px; width:40px; height:40px; position:absolute; z-index:5; display:none; cursor:pointer; }
      .dice-3d { position:relative; width:100%; height:100%; transform-style:preserve-3d; transition: transform 2s cubic-bezier(0.25,0.1,0.25,1); }
      .dice-face { position:absolute; width:42px; height:42px; background:#fff; border:2px solid #333; border-radius:8px; display:flex; justify-content:center; align-items:center; }
      .row { display:flex; flex-direction:column; justify-content:center; align-items:center; }
      .dot { width:6px; height:6px; background:#333; border-radius:50%; margin:1.8px; }
      .dot.red { background:red; }
      .hide-dot { visibility:hidden; }
      .front { transform:translateZ(20px); }
      .back { transform:rotateY(180deg) translateZ(20px); }
      .top { transform:rotateX(90deg) translateZ(20px); }
      .bottom { transform:rotateX(-90deg) translateZ(20px); }
      .left { transform:rotateY(-90deg) translateZ(20px); }
      .right { transform:rotateY(90deg) translateZ(20px); }
      .side-panel { flex:0 0 260px; display:flex; flex-direction:column; gap:8px; min-width:240px; }
      .panel-card { background:rgba(30,40,65,0.85); border-radius:10px; padding:8px 10px; border:1px solid rgba(226,176,74,0.35); }
      .panel-card h3 { color:#e2b04a; font-size:0.8em; margin-bottom:6px; text-align:center; font-weight:600; }
      .player-indicator { display:flex; align-items:center; gap:8px; padding:4px 8px; border-radius:8px; font-weight:600; font-size:0.8em; color:#ccc; transition:0.4s; flex-wrap:wrap; }
      .player-indicator.active { background:rgba(226,176,74,0.2); border:2px solid #e2b04a; color:#fff; box-shadow:0 0 12px rgba(226,176,74,0.3); animation:pulse 2s infinite; }
      @keyframes pulse { 0%,100%{ box-shadow:0 0 12px rgba(226,176,74,0.3); } 50%{ box-shadow:0 0 24px rgba(226,176,74,0.6); } }
      /* .status-text 已删除 */
      .action-btn { background:linear-gradient(135deg,#e2b04a,#c9973a); color:#1a1a2e; border:none; border-radius:20px; padding:6px 12px; font-size:0.8em; font-weight:700; cursor:pointer; letter-spacing:1px; transition:0.25s; text-transform:uppercase; width:100%; }
      .action-btn:hover { background:linear-gradient(135deg,#f0c860,#e2b04a); }
      .action-btn.disabled { background:linear-gradient(135deg,#555,#444); color:#999; cursor:not-allowed; opacity:0.6; pointer-events:none; }
      .key-hint { font-size:0.6em; opacity:0.7; margin-left:4px; }
      .btn-reset { background:transparent; border:2px solid rgba(255,255,255,0.4); color:#ccc; font-size:0.75em; padding:6px 14px; margin-top:4px; cursor:pointer; letter-spacing:1px; transition:0.25s; text-transform:uppercase; font-family:inherit; border-radius:20px; width:100%; }
      .btn-reset:hover { border-color:#fff; color:#fff; }
      .modal-overlay {
        position:fixed; top:0; left:0; width:100%; height:100%;
        background: transparent; z-index:100; display:flex; justify-content:center; align-items:center;
        backdrop-filter: none;
      }
      .modal-overlay.hidden { display:none; }
      .modal-box {
        background: rgba(255, 255, 255, 0.6);
        border:2px solid #e2b04a;
        border-radius:20px; padding:24px 28px; max-width:420px; width:90%;
        box-shadow:0 20px 50px rgba(0,0,0,0.3);
        color: #1a1a2e; text-align:center;
      }
      .modal-box h3 { color:#e2b04a; margin-bottom:16px; font-size:1.1em; }
      .question-text { font-size:1em; margin-bottom:20px; line-height:1.4; }
      .options-grid { display:flex; flex-direction:column; gap:10px; margin-bottom:10px; }
      .option-btn {
        background: rgba(0,0,0,0.05);
        border:1px solid rgba(226,176,74,0.8);
        color:#1a1a2e; padding:10px 16px; border-radius:10px;
        cursor:pointer; font-size:0.9em; transition:0.2s; text-align:left;
      }
      .option-btn:hover { background: rgba(226,176,74,0.2); border-color:#e2b04a; }
      .option-btn:disabled { cursor: not-allowed; opacity: 0.7; }
      .reward-grid { display:flex; flex-wrap:wrap; gap:12px; justify-content:center; margin-top:10px; }
      .reward-card {
        background: linear-gradient(145deg, #ffffff00, #f0f0f000);
        border:2px solid #e2b04a; border-radius:16px; padding:16px 12px;
        width:100px; cursor:pointer; transition:0.2s; font-weight:bold;
        color:#1a1a2e; font-size:1em; text-align:center;
      }
      .reward-card:hover { background:#e2b04a; color:#fff; transform:scale(1.05); }
    </style>
  </head>

          const index = Math.floor(Math.random() * remainingQuestions.length);
          return remainingQuestions[index];
        }

        // --- AI专用完全随机抽题（不影响剩余题库） ---
        function getRandomQuestionForAI() {
          return questionBank[Math.floor(Math.random() * questionBank.length)];
        }

        const rewardPool = [
          { type: 'ap', value: 3, label: '行动点数 +3' },
          { type: 'reduce', value: 3, label: '使一名玩家行动点数 -3' },
          { type: 'reroll', label: '再摇一次骰子增加行动点数' },
          { type: 'disableQuiz', label: '使一名玩家下回合不能触发答题' },
          { type: 'resetQuiz', label: '本回合可再次答题' },
          { type: 'swap', label: '与一名玩家交换位置' },
          { type: 'teleport', label: '消耗所有行动点数，传送到一个已打卡点' },
          { type: 'addTwoTargets', label: '增加两个未打卡点' }
        ];
        function getRandomRewards(count = 3) {
          const shuffled = [...rewardPool].sort(() => Math.random() - 0.5);
          return shuffled.slice(0, count);
        }

        const GAME_WIDTH=800, GAME_HEIGHT=600;
        const CELL_RADIUS=3, CITY_RADIUS=6;

        const staticCanvas = document.createElement("canvas");
        staticCanvas.width = GAME_WIDTH; staticCanvas.height = GAME_HEIGHT;
        const staticCtx = staticCanvas.getContext("2d");
        function drawStaticCache() {
          staticCtx.clearRect(0,0,GAME_WIDTH,GAME_HEIGHT);
          // 连线已彻底移除
          nodes.forEach(node => {
            if (node.type==="city") {
              staticCtx.beginPath(); staticCtx.arc(node.x,node.y,CITY_RADIUS,0,Math.PI*2);
              staticCtx.strokeStyle="#e67e22"; staticCtx.lineWidth=2.5; staticCtx.stroke();
            } else {
              staticCtx.beginPath(); staticCtx.arc(node.x,node.y,CELL_RADIUS,0,Math.PI*2);
              staticCtx.strokeStyle="#c9b896"; staticCtx.lineWidth=1.5; staticCtx.stroke();
            }
          });
        }

        let players = [];
        const COLORS = ["#e74c3c","#3498db","#2ecc71"];
        const GLOW_COLORS = ["#ff6b6b","#5dade2","#7dcea0"];
        const NAMES = ["你","电脑1","电脑2"];
        const isAI = [false, true, true];
        let currentPlayerIndex = 0;
        let isRolling=false, isMoving=false, gameOver=false;
        let firstRollResolve=null;
        let waitingForPlayerRoll=false;
        let waitingForPlayerMove=false;
        let reachableNodes = [];
        let floatingTexts = [];
        let modalActive = false;
        let selectingTargetPlayer = false;
        let targetPlayerResolve = null;
        let selectingCity = false;
        let cityResolve = null;

        let needsRedraw = true;
        let rafRunning = false;

        function requestRedraw() {
          needsRedraw = true;
          if (!rafRunning) { rafRunning = true; requestAnimationFrame(renderLoop); }
        }
        function stopRafIfIdle() {
          if (!needsRedraw && floatingTexts.length === 0) { rafRunning = false; }
          else if (!rafRunning) { rafRunning = true; requestAnimationFrame(renderLoop); }
        }

        function addFloatingText(text,x,y,duration=2000) {
          floatingTexts.push({text,x,y,timer:duration});
          requestRedraw();
        }
        function updateFloatingTexts(deltaMs) {
          let changed = false;
          for(let i=floatingTexts.length-1;i>=0;i--) {
            floatingTexts[i].timer -= deltaMs;
            if(floatingTexts[i].timer<=0) { floatingTexts.splice(i,1); changed = true; }
          }
          if (changed || floatingTexts.length > 0) requestRedraw();
        }

        function sampleRandom(arr,n) {
          const s=[...arr];
          for(let i=s.length-1;i>0;i--) { const j=Math.floor(Math.random()*(i+1)); [s[i],s[j]]=[s[j],s[i]]; }
          return s.slice(0,Math.min(n,arr.length));
        }

        function drawNextTargets(player) {
          const remaining = player.remainingPool.filter(c => !player.completed.includes(c));
          if(remaining.length===0) { player.targets=[]; return; }
          player.targets = sampleRandom(remaining, Math.min(3,remaining.length));
        }

        function initPlayers() {
          players = NAMES.map((name,i) => ({
            index:i, name, color:COLORS[i], glowColor:GLOW_COLORS[i],
            currentNode: cityIds[Math.floor(Math.random()*cityIds.length)],
            completed:[], targets:[], remainingPool:[...cityIds],
            actionPoints:0, hasAnsweredThisTurn:false,
            nextTurnPenalty: 0, disableQuizNextTurn: false, quizDisabledThisTurn: false
          }));
          players.forEach(p => { p.completed=[]; p.remainingPool=[...cityIds]; drawNextTargets(p); });
          currentPlayerIndex=0; isRolling=false; isMoving=false; gameOver=false;
          firstRollResolve=null; waitingForPlayerRoll=false; waitingForPlayerMove=false;
          reachableNodes=[]; floatingTexts=[];
          modalActive=false; selectingTargetPlayer=false; selectingCity=false;
          modalOverlay.classList.add("hidden");
          requestRedraw();
          updateUI();
          hideDice();
          updateDiceButtonState();
        }

        function getCurrentPlayer() { return players[currentPlayerIndex]; }
        function isCurrentAI() { return isAI[currentPlayerIndex]; }

        function aiChooseNode(player, reachable) {
          const undone = player.targets.filter(t => !player.completed.includes(t));
          const targetInReach = reachable.filter(n => undone.includes(n) && n!==player.currentNode);
          if(targetInReach.length>0) {
            let best=targetInReach[0], bestDist=shortestSteps(player.currentNode,best);
            for(const n of targetInReach) { const d=shortestSteps(player.currentNode,n); if(d<bestDist){bestDist=d;best=n;} }
            return best;
          }
          let bestNode=reachable[0], bestDist=Infinity;
          for(const node of reachable) {
            if(node===player.currentNode) continue;
            for(const t of undone) { const d=shortestSteps(node,t); if(d<bestDist){bestDist=d;bestNode=node;} }
          }
          return bestNode || reachable[0];
        }

        function aiChooseSwapTarget(player) {
          const undone = player.targets.filter(t => !player.completed.includes(t));
          const others = players.filter(p => p.index !== player.index);
          if (others.length === 0) return null;
          if (undone.length === 0) return others[Math.floor(Math.random() * others.length)];
          let bestPlayer = others[0];
          let bestMinDist = Infinity;
          for (const other of others) {
            let minDist = Infinity;
            for (const target of undone) { const d = shortestSteps(other.currentNode, target); if (d < minDist) minDist = d; }
            if (minDist < bestMinDist) { bestMinDist = minDist; bestPlayer = other; }
          }
          return bestPlayer;
        }

        function aiChooseTeleportCity(player) {
          const completed = player.completed.filter(id => id !== player.currentNode && nodes[id].type === 'city');
          if (completed.length === 0) return null;
          const undone = player.targets.filter(t => !player.completed.includes(t));
          if (undone.length === 0) return completed[0];
          let bestCity = completed[0];
          let bestDist = Infinity;
          for (const city of completed) {
            let minDist = Infinity;
            for (const target of undone) { const d = shortestSteps(city, target); if (d < minDist) minDist = d; }
            if (minDist < bestDist) { bestDist = minDist; bestCity = city; }
          }
          return bestCity;
        }

        function aiEvaluateReward(reward, player) {
          const playerIdx = player.index;
          const currentAP = player.actionPoints;
          const targets = player.targets.filter(t => !player.completed.includes(t));
          const totalCities = TOTAL_CITIES;
          const others = players.filter(p => p.index !== playerIdx);

          switch (reward.type) {
            case 'ap': return 60 + Math.max(0, 40 - currentAP * 4);
            case 'reduce': {
              if (others.length === 0) return 0;
              const maxDone = Math.max(...others.map(o => o.completed.length));
              return 50 + Math.round((maxDone / totalCities) * 30);
            }
            case 'reroll': return 50 + Math.max(0, 30 - currentAP * 3);
            case 'disableQuiz': {
              if (others.length === 0) return 0;
              const maxDone = Math.max(...others.map(o => o.completed.length));
              return 45 + Math.round((maxDone / totalCities) * 25);
            }
            case 'resetQuiz': {
              const reachable = getReachableNodes(player.currentNode, currentAP);
              return reachable.some(id => id !== player.currentNode && nodes[id].type === 'city') ? 60 : 0;
            }
            case 'swap': {
              if (others.length === 0) return 0;
              let bestDistOther = Infinity, bestDistSelf = Infinity;
              let found = false;
              for (const target of targets) {
                const selfDist = shortestSteps(player.currentNode, target);
                for (const other of others) {
                  const otherDist = shortestSteps(other.currentNode, target);
                  if (otherDist < selfDist) { found = true; if (otherDist < bestDistOther) { bestDistOther = otherDist; bestDistSelf = selfDist; } }
                }
              }
              if (!found) return 0;
              const ratio = bestDistSelf > 0 ? (1 - bestDistOther / bestDistSelf) : 0;
              return 40 + Math.max(0, Math.round(ratio * 30));
            }
            case 'teleport': {
              const completed = player.completed.filter(id => id !== player.currentNode && nodes[id].type === 'city');
              if (completed.length === 0) return 0;
              let bestCityDist = Infinity, bestSelfDist = Infinity;
              let found = false;
              for (const target of targets) {
                const selfDist = shortestSteps(player.currentNode, target);
                for (const city of completed) {
                  const cityDist = shortestSteps(city, target);
                  if (cityDist < selfDist) { found = true; if (cityDist < bestCityDist) { bestCityDist = cityDist; bestSelfDist = selfDist; } }
                }
              }
              if (!found) return 0;
              const ratio = bestSelfDist > 0 ? (1 - bestCityDist / bestSelfDist) : 0;
              return 55 + Math.max(0, Math.round(ratio * 25));
            }
            case 'addTwoTargets': {
              const hiddenCities = player.remainingPool.filter(c => !player.completed.includes(c) && !player.targets.includes(c));
              if (hiddenCities.length === 0) return 0;
              const currentTargetCount = targets.length;
              const bonus = currentTargetCount <= 2 ? Math.round((2 - currentTargetCount + 1) * 7.5) : 0;
              return 35 + Math.min(15, bonus);
            }
            default: return 50;
          }
        }

        function aiChooseBestReward(rewards, player) {
          const scored = rewards.map(r => ({ reward: r, score: aiEvaluateReward(r, player) }));
          const usable = scored.filter(s => s.score > 0);
          if (usable.length === 0) return rewards[Math.floor(Math.random() * rewards.length)];
          const withJitter = usable.map(s => ({ ...s, final: s.score + (Math.random() * 20 - 10) }));
          withJitter.sort((a,b) => b.final - a.final);
          return withJitter[0].reward;
        }

        function updateUI() {
          players.forEach((p,i) => {
            const total=TOTAL_CITIES, done=p.completed.length;
            const undone = p.targets.filter(t => !p.completed.includes(t));
            let str;
            if(done>=total) str="全部完成";
            else if(undone.length===0) str="抽取中…";
            else str=undone.map(t => nodes[t].name).join("、");
            scoreEls[i].textContent = `🎯${str} (${done}/${total})`;
            let apText = p.actionPoints>0 ? `⚡${p.actionPoints}` : "";
            if (p.nextTurnPenalty > 0) apText += ` (下回合-${p.nextTurnPenalty})`;
            if (p.disableQuizNextTurn) apText += " 🚫答题";
            apEls[i].textContent = apText;
          });
          indicators.forEach((el,i) => el.classList.toggle("active", i===currentPlayerIndex && !gameOver));
          updateDiceButtonState();
        }

        function updateDiceButtonState() {
          const canRoll = (waitingForPlayerRoll && !isCurrentAI() && !modalActive && !selectingTargetPlayer && !selectingCity) || firstRollResolve!==null;
          if(canRoll && !gameOver) { btnRollDice.classList.remove("disabled"); btnRollDice.disabled = false; }
          else { btnRollDice.classList.add("disabled"); btnRollDice.disabled = true; }
        }

        function getBoardOffset() {
          const br=boardWrapper.getBoundingClientRect(), gr=gameContainer.getBoundingClientRect();
          return { left:br.left-gr.left, top:br.top-gr.top };
        }
        function showDiceAt(nodeIndex) {
          const pos=nodes[nodeIndex], off=getBoardOffset();
          diceContainer.style.left=off.left+pos.x-21+"px"; diceContainer.style.top=off.top+pos.y-55+"px";
          diceContainer.style.display="block";
        }
        function hideDice() { diceContainer.style.display="none"; }

        function drawBoard() {
          gameCtx.clearRect(0,0,GAME_WIDTH,GAME_HEIGHT);
          gameCtx.drawImage(staticCanvas,0,0);
          const player = getCurrentPlayer();
          if(waitingForPlayerMove && !isCurrentAI() && player.actionPoints>0 && !selectingTargetPlayer && !selectingCity) {
            reachableNodes.forEach(idx => {
              const pos=nodes[idx];
              const isTarget = player && player.targets.includes(idx) && !player.completed.includes(idx);
              const radius = nodes[idx].type==="city"?CITY_RADIUS:CELL_RADIUS;
              gameCtx.beginPath(); gameCtx.arc(pos.x,pos.y,radius,0,Math.PI*2);
              gameCtx.strokeStyle=isTarget?"#27ae60":"#2980b9"; gameCtx.lineWidth=3; gameCtx.stroke();
            });
          }
          if (selectingCity && player) {
            const completedCities = player.completed.filter(id => nodes[id].type === "city");
            completedCities.forEach(id => {
              const pos = nodes[id];
              gameCtx.beginPath(); gameCtx.arc(pos.x, pos.y, CITY_RADIUS+2, 0, Math.PI*2);
              gameCtx.strokeStyle = "#f1c40f"; gameCtx.lineWidth = 3; gameCtx.stroke();
            });
          }
          drawAllPieces();
          floatingTexts.forEach(ft => {
            gameCtx.save(); gameCtx.font="bold 14px 'PingFang SC','Microsoft YaHei',sans-serif";
            gameCtx.fillStyle="#fff"; gameCtx.shadowColor="rgba(0,0,0,0.8)"; gameCtx.shadowBlur=4;
            gameCtx.textAlign="center"; gameCtx.fillText(ft.text, ft.x, ft.y-14);
            gameCtx.restore();
          });
          if (selectingTargetPlayer) {
            players.forEach((p, i) => {
              if (i === currentPlayerIndex) return;
              const pos = getPlayerScreenPos(p);
              gameCtx.beginPath(); gameCtx.arc(pos.x, pos.y, 14, 0, Math.PI*2);
              gameCtx.strokeStyle = "#fff"; gameCtx.lineWidth = 3; gameCtx.stroke();
              gameCtx.fillStyle = "rgba(255,255,255,0.2)"; gameCtx.fill();
            });
          }
        }

        function getPlayerScreenPos(player) {
          const node = nodes[player.currentNode];
          const occ = {};
          players.forEach((p, i) => { if (!occ[p.currentNode]) occ[p.currentNode] = []; occ[p.currentNode].push(i); });
          const pis = occ[player.currentNode];
          const idx = pis.indexOf(player.index);
          let ox = 0, oy = 0;
          if (pis.length === 2) { ox = idx===0?-4:4; oy = idx===0?-3:3; }
          if (pis.length === 3) {
            if (idx === 0) { ox = -5; oy = -4; } else if (idx === 1) { ox = 5; oy = -4; } else { ox = 0; oy = 5; }
          }
          return { x: node.x + ox, y: node.y + oy };
        }

        function drawAllPieces() {
          const occ={};
          players.forEach((p,i) => { if(!occ[p.currentNode]) occ[p.currentNode]=[]; occ[p.currentNode].push(i); });
          for(const [nodeIdx,pis] of Object.entries(occ)) {
            const pos=nodes[+nodeIdx];
            pis.forEach((pi,idx) => {
              let ox=0,oy=0;
              if(pis.length===2) { ox=idx===0?-4:4; oy=idx===0?-3:3; }
              if(pis.length===3) { if(idx===0){ox=-5;oy=-4;} else if(idx===1){ox=5;oy=-4;} else{ox=0;oy=5;} }
              drawPiece(pos.x+ox,pos.y+oy,players[pi], pi===currentPlayerIndex && !gameOver);
            });
          }
        }

        function drawPiece(x,y,player,active) {
          gameCtx.fillStyle = "rgba(0,0,0,0.3)";
          gameCtx.beginPath(); gameCtx.arc(x+1, y+1.5, 6, 0, Math.PI*2); gameCtx.fill();
          const grad = gameCtx.createRadialGradient(x-2, y-3, 2, x, y, 8);
          grad.addColorStop(0,"#fff"); grad.addColorStop(0.3, player.color); grad.addColorStop(1,"#1a1a1a");
          gameCtx.fillStyle = grad;
          gameCtx.beginPath(); gameCtx.arc(x, y, 6, 0, Math.PI*2); gameCtx.fill();
          gameCtx.fillStyle = "rgba(255,255,255,0.5)";
          gameCtx.beginPath(); gameCtx.arc(x-1, y-2, 1.5, 0, Math.PI*2); gameCtx.fill();
          gameCtx.strokeStyle = "rgba(255,255,255,0.7)"; gameCtx.lineWidth = 0.1; gameCtx.stroke();
        }

        const rotateMap = {
          1:{rotateX:"0deg",rotateY:"0deg"}, 2:{rotateX:"90deg",rotateY:"0deg"},
          3:{rotateX:"180deg",rotateY:"90deg"}, 4:{rotateX:"0deg",rotateY:"90deg"},
          5:{rotateX:"270deg",rotateY:"0deg"}, 6:{rotateX:"0deg",rotateY:"180deg"}
        };
        function rollDiceAnimation(finalOverride) {
          return new Promise(resolve => {
            isRolling=true; waitingForPlayerRoll=false; waitingForPlayerMove=false; updateDiceButtonState();
            dice3d.style.transition="none"; dice3d.style.transform="rotateX(0deg) rotateY(0deg)"; dice3d.offsetHeight;
            const finalValue = finalOverride || Math.floor(Math.random()*6)+1;
            const obj=rotateMap[finalValue];
            let transform="", transform2="";
            for(const key in obj) { transform+=`${key}(${obj[key]}) `; transform2+=`${key}(${parseInt(obj[key])+360*2}deg) `; }
            dice3d.style.transition="transform 2s cubic-bezier(0.25,0.1,0.25,1)"; dice3d.style.transform=transform2;
            setTimeout(() => { dice3d.style.transition="none"; dice3d.style.transform=transform; isRolling=false; resolve(finalValue); },2100);
          });
        }
        const sleep = ms => new Promise(r => setTimeout(r,ms));

        async function performReroll(player) {
          showDiceAt(player.currentNode);
          const diceValue = await rollDiceAnimation();
          await sleep(100); hideDice();
          player.actionPoints += diceValue;
          updateUI();
        }

        function checkCompletion(player) {
          let changed = false;
          const nodeId = player.currentNode;
          if(player.targets.includes(nodeId) && !player.completed.includes(nodeId)) { player.completed.push(nodeId); changed=true; }
          if(changed) {
            const done = player.targets.every(t => player.completed.includes(t));
            if(done && player.completed.length < TOTAL_CITIES) { drawNextTargets(player); }
            updateUI();
          }
          return changed;
        }

        function movePlayerToNode(player, targetNodeId) {
          const steps = shortestSteps(player.currentNode, targetNodeId);
          if(steps===Infinity || steps > player.actionPoints) return false;
          player.currentNode = targetNodeId;
          player.actionPoints -= steps;
          return true;
        }

        function canMoveFurther(player) {
          if(player.actionPoints <= 0) return false;
          const reachable = getReachableNodes(player.currentNode, player.actionPoints);
          return reachable.length > 1;
        }

        function showHumanQuestion(question) {
          return new Promise(resolve => {
            const q = question;
            modalBox.innerHTML = `<h3>📝 回答问题</h3><div class="question-text">${q.question}</div><div class="options-grid">${q.options.map((opt,idx) => `<button class="option-btn" data-idx="${idx}">${opt}</button>`).join("")}</div>`;
            modalOverlay.classList.remove("hidden"); modalActive = true; updateDiceButtonState();
            const buttons = modalBox.querySelectorAll(".option-btn");
            buttons.forEach(btn => {
              btn.addEventListener("click", (e) => {
                const idx = parseInt(e.currentTarget.dataset.idx);
                buttons.forEach(b => b.disabled = true);
                const correctIdx = q.answer;
                buttons[correctIdx].style.background = "#2ecc71"; buttons[correctIdx].style.borderColor = "#2ecc71"; buttons[correctIdx].style.color = "#fff";
                if (idx !== correctIdx) {
                  e.currentTarget.style.background = "#e74c3c"; e.currentTarget.style.borderColor = "#e74c3c"; e.currentTarget.style.color = "#fff";
                  setTimeout(() => { modalOverlay.classList.add("hidden"); modalActive = false; updateDiceButtonState(); resolve(false); }, 1000);
                } else {
                  modalOverlay.classList.add("hidden"); modalActive = false; updateDiceButtonState(); resolve(true);
                }
              });
            });
          });
        }

        function showHumanReward(rewards) {
          return new Promise(resolve => {
            modalBox.innerHTML = `<h3>🎁 回答正确！选择一个奖励</h3><div class="reward-grid">${rewards.map((reward, idx) => `<div class="reward-card" data-idx="${idx}">${reward.label}</div>`).join("")}</div>`;
            modalOverlay.classList.remove("hidden"); modalActive = true; updateDiceButtonState();
            modalBox.querySelectorAll(".reward-card").forEach(card => {
              card.addEventListener("click", (e) => {
                const idx = parseInt(e.currentTarget.dataset.idx);
                modalOverlay.classList.add("hidden"); modalActive = false; updateDiceButtonState();
                resolve(rewards[idx]);
              });
            });
          });
        }

        function showVictoryModal(player) {
          return new Promise(resolve => {
            modalBox.innerHTML = `
              <h2 style="font-size:1.5em;margin-bottom:12px;">🏆 ${player.name} 获胜！</h2>
              <p style="margin-bottom:20px;">你完成了全部山脉的打卡，征服了崇山峻岭！</p>
              <button class="action-btn" style="width:auto;padding:10px 30px;">🔄 再来一局</button>
            `;
            modalOverlay.classList.remove('hidden');
            modalActive = true;
            updateDiceButtonState();

            const btn = modalBox.querySelector('.action-btn');
            btn.addEventListener('click', () => {
              modalOverlay.classList.add('hidden');
              modalActive = false;
              resolve(); // 告诉游戏“胜利展示完毕”，可以继续后续流程（其实直接重置）
            });
          });
        }

        function selectTargetPlayerForHuman() {
          return new Promise(resolve => {
            selectingTargetPlayer = true; selectingCity = false;
            targetPlayerResolve = resolve; cityResolve = null;
            requestRedraw(); updateDiceButtonState();
          });
        }

        function selectCityForHuman() {
          return new Promise(resolve => {
            selectingCity = true; selectingTargetPlayer = false;
            cityResolve = resolve; targetPlayerResolve = null;
            requestRedraw(); updateDiceButtonState();
          });
        }

        function aiSelectTargetPlayer(currentPlayer) {
          const others = players.filter(p => p.index !== currentPlayer.index);
          return others[Math.floor(Math.random() * others.length)];
        }

        function addTwoTargets(player) {
          const hiddenCities = player.remainingPool.filter(c => !player.completed.includes(c) && !player.targets.includes(c));
          if (hiddenCities.length === 0) { return; }
          const toAdd = sampleRandom(hiddenCities, Math.min(2, hiddenCities.length));
          player.targets.push(...toAdd);
          updateUI();
        }

        async function handleHumanCityQuiz(player) {
          if (player.quizDisabledThisTurn) return;
          if(player.hasAnsweredThisTurn) return;
          if(nodes[player.currentNode].type !== "city") return;
          player.hasAnsweredThisTurn = true;
          const q = getRandomQuestion();
          const correct = await showHumanQuestion(q);
          if(!correct) { await sleep(400); return; }
          // 答对从题库移除
          removeQuestion(q);

          const rewards = getRandomRewards(3);
          const chosenReward = await showHumanReward(rewards);
          
          if (chosenReward.type === 'ap') { player.actionPoints += chosenReward.value; }
          else if (chosenReward.type === 'reduce') {
            const target = await selectTargetPlayerForHuman(); target.nextTurnPenalty += chosenReward.value;
            addFloatingText(`下回合-${chosenReward.value}`, getPlayerScreenPos(target).x, getPlayerScreenPos(target).y, 2000);
          }
          else if (chosenReward.type === 'reroll') { await performReroll(player); }
          else if (chosenReward.type === 'disableQuiz') {
            const target = await selectTargetPlayerForHuman(); target.disableQuizNextTurn = true;
            addFloatingText(`下回合禁止答题`, getPlayerScreenPos(target).x, getPlayerScreenPos(target).y, 2000);
          }
          else if (chosenReward.type === 'resetQuiz') { player.hasAnsweredThisTurn = false; }
          else if (chosenReward.type === 'swap') {
            const target = await selectTargetPlayerForHuman();
            const tempNode = player.currentNode; player.currentNode = target.currentNode; target.currentNode = tempNode;
            player.actionPoints = 0;
            addFloatingText("交换位置", getPlayerScreenPos(player).x, getPlayerScreenPos(player).y, 2000);
          }
          else if (chosenReward.type === 'teleport') {
            if (player.completed.length === 0) { await sleep(800); return; }
            const cityId = await selectCityForHuman();
            if (cityId !== null) { player.currentNode = cityId; player.actionPoints = 0; addFloatingText("传送！", nodes[cityId].x, nodes[cityId].y, 2000); }
          }
          else if (chosenReward.type === 'addTwoTargets') { addTwoTargets(player); }
          updateUI(); await sleep(600);
        }

        async function handleAICityQuiz(player) {
          if (player.quizDisabledThisTurn) return;
          if(player.hasAnsweredThisTurn) return;
          if(nodes[player.currentNode].type !== "city") return;
          player.hasAnsweredThisTurn = true;
          const pos = nodes[player.currentNode];
          const correct = Math.random() < 0.9;//电脑答题正确率
          if(!correct) { addFloatingText("回答错误", pos.x, pos.y); await sleep(1000); return; }
          addFloatingText("回答正确", pos.x, pos.y); await sleep(600);
          const rewards = getRandomRewards(3);
          const chosenReward = aiChooseBestReward(rewards, player);
          
          if (chosenReward.type === 'ap') { player.actionPoints += chosenReward.value; addFloatingText(`行动点数 +${chosenReward.value}`, pos.x, pos.y+20); }
          else if (chosenReward.type === 'reduce') { const target = aiSelectTargetPlayer(player); target.nextTurnPenalty += chosenReward.value; addFloatingText(`使 ${target.name} 下回合-${chosenReward.value}`, pos.x, pos.y+20); }
          else if (chosenReward.type === 'reroll') { await performReroll(player); }
          else if (chosenReward.type === 'disableQuiz') { const target = aiSelectTargetPlayer(player); target.disableQuizNextTurn = true; addFloatingText(`使 ${target.name} 下回合禁止答题`, pos.x, pos.y+20); }
          else if (chosenReward.type === 'resetQuiz') { player.hasAnsweredThisTurn = false; addFloatingText(`本回合可再次答题`, pos.x, pos.y+20); }
          else if (chosenReward.type === 'swap') {
            const target = aiChooseSwapTarget(player);
            if (target) { const tempNode = player.currentNode; player.currentNode = target.currentNode; target.currentNode = tempNode; player.actionPoints = 0; addFloatingText(`与 ${target.name} 交换位置`, pos.x, pos.y+20); }
          }
          else if (chosenReward.type === 'teleport') {
            const cityId = aiChooseTeleportCity(player);
            if (cityId !== null) { player.currentNode = cityId; player.actionPoints = 0; addFloatingText(`传送到 ${nodes[cityId].name}`, pos.x, pos.y+20); }
          }
          else if (chosenReward.type === 'addTwoTargets') { addTwoTargets(player); addFloatingText(`未打卡点+2`, pos.x, pos.y+20); }
          updateUI(); await sleep(1000);
        }

        async function triggerQuizIfNeeded(player) {
          if (player.quizDisabledThisTurn) return;
          if(player.hasAnsweredThisTurn) return;
          if(nodes[player.currentNode].type !== "city") return;
          if(isAI[player.index]) await handleAICityQuiz(player);
          else await handleHumanCityQuiz(player);
        }

        async function afterMove(player) {
          checkCompletion(player);
          if(player.completed.length >= TOTAL_CITIES) { gameOver = true; hideDice(); updateUI(); updateDiceButtonState(); await showVictoryModal(player); resetGame(); return true; }
          await triggerQuizIfNeeded(player);
          return gameOver;
        }

        async function continueMove() {
          const player = getCurrentPlayer();
          if(gameOver) return;
          if(!canMoveFurther(player)) { await sleep(1000); finishTurn(); return; }
          reachableNodes = getReachableNodes(player.currentNode, player.actionPoints);
          if(reachableNodes.length <= 1) { await sleep(1000); finishTurn(); return; }
          if(!isCurrentAI()) {
            waitingForPlayerMove = true; waitingForPlayerRoll = false; updateDiceButtonState();
            requestRedraw();
          } else { await aiContinueMove(); }
        }

        async function aiContinueMove() {
          const player = getCurrentPlayer();
          while (canMoveFurther(player) && !gameOver) {
            if (player.completed.length >= TOTAL_CITIES) break;
            reachableNodes = getReachableNodes(player.currentNode, player.actionPoints);
            if (reachableNodes.length <= 1) break;
            const target = aiChooseNode(player, reachableNodes);
            const path = findShortestPath(player.currentNode, target);
            if (path.length < 2) break;
            let moved = false;
            for (let i = 1; i < path.length; i++) {
              if (player.actionPoints <= 0) break;
              const nextNode = path[i];
              player.currentNode = nextNode; player.actionPoints -= 1; updateUI();
              requestRedraw();
              await sleep(500);
              const ended = await afterMove(player);
              if (ended || gameOver) return;
              if (player.completed.length >= TOTAL_CITIES) break;
              moved = true;
            }
            if (gameOver || player.completed.length >= TOTAL_CITIES) break;
            if (!moved) break;
          }
          if (!gameOver) finishTurn();
        }

        async function handleTurn() {
          if(gameOver) return;
          const player = getCurrentPlayer();
          if (player.disableQuizNextTurn) { player.quizDisabledThisTurn = true; player.disableQuizNextTurn = false; } else { player.quizDisabledThisTurn = false; }
          player.hasAnsweredThisTurn = false;
          reachableNodes = []; waitingForPlayerMove = false;
          if(!isCurrentAI()) {
            waitingForPlayerRoll = true; updateDiceButtonState(); showDiceAt(player.currentNode);
            requestRedraw();
          } else {
            waitingForPlayerRoll = false; updateDiceButtonState(); showDiceAt(player.currentNode);
            await sleep(600); await handleRollDice();
          }
        }

        async function handleRollDice() {
          if(isRolling || isMoving || gameOver) return;
          const player = getCurrentPlayer();
          waitingForPlayerRoll = false; waitingForPlayerMove = false; updateDiceButtonState();
          const diceValue = await rollDiceAnimation(); await sleep(100); hideDice();
          let actualGain = diceValue;
          if (player.nextTurnPenalty > 0) { actualGain = Math.max(0, diceValue - player.nextTurnPenalty); player.nextTurnPenalty = 0; }
          player.actionPoints += actualGain;
          updateUI(); await sleep(400); await continueMove();
        }

        function getCanvasClickCoordinates(e) {
          const rect = gameCanvas.getBoundingClientRect();
          const clientX = e.touches?.[0]?.clientX ?? e.clientX;
          const clientY = e.touches?.[0]?.clientY ?? e.clientY;
          let mouseX, mouseY;
          if (window.isRotated) {
            const relX = clientX - rect.left;
            const relY = clientY - rect.top;
            const normX = relX / rect.width;
            const normY = relY / rect.height;
            mouseX = normY * GAME_WIDTH;
            mouseY = (1 - normX) * GAME_HEIGHT;
          } else {
            const scaleX = GAME_WIDTH / rect.width;
            const scaleY = GAME_HEIGHT / rect.height;
            mouseX = (clientX - rect.left) * scaleX;
            mouseY = (clientY - rect.top) * scaleY;
          }
          return { mouseX, mouseY };
        }

        async function onCanvasInteraction(e) {
          e.preventDefault();
          const { mouseX, mouseY } = getCanvasClickCoordinates(e);

          if (selectingCity) {
            const player = getCurrentPlayer();
            const completedCities = player.completed.filter(id => nodes[id].type === "city");
            let closestCity = null; let minDist = 15;
            for (const id of completedCities) { const node = nodes[id]; const dx = node.x - mouseX, dy = node.y - mouseY; const dist = Math.sqrt(dx*dx+dy*dy); if (dist < minDist) { minDist = dist; closestCity = id; } }
            if (closestCity !== null) { selectingCity = false; if (cityResolve) { cityResolve(closestCity); cityResolve = null; } updateDiceButtonState(); requestRedraw(); }
            return;
          }

          if (selectingTargetPlayer) {
            const currentPlayer = getCurrentPlayer();
            let closestPlayer = null; let minDist = 20;
            for (const p of players) { if (p.index === currentPlayer.index) continue; const pos = getPlayerScreenPos(p); const dx = pos.x - mouseX; const dy = pos.y - mouseY; const dist = Math.sqrt(dx*dx+dy*dy); if (dist < minDist) { minDist = dist; closestPlayer = p; } }
            if (closestPlayer) { selectingTargetPlayer = false; if (targetPlayerResolve) { targetPlayerResolve(closestPlayer); targetPlayerResolve = null; } updateDiceButtonState(); requestRedraw(); }
            return;
          }

          if(gameOver || isMoving || isRolling || modalActive) return;
          if(!waitingForPlayerMove || isCurrentAI()) return;
          if(reachableNodes.length <= 1 || getCurrentPlayer().actionPoints <= 0) return;

          let clickedNode = null;
          for(const id of reachableNodes) {
            const node = nodes[id];
            const dx = node.x - mouseX, dy = node.y - mouseY;
            const radius = nodes[id].type==="city"?CITY_RADIUS:CELL_RADIUS;
            if(Math.sqrt(dx*dx+dy*dy) <= radius+8) { clickedNode=id; break; }
          }
          if(clickedNode===null || clickedNode===getCurrentPlayer().currentNode) return;
          const player = getCurrentPlayer();
          if(!movePlayerToNode(player, clickedNode)) return;
          waitingForPlayerMove = false;
          updateUI(); requestRedraw();
          await sleep(300);
          const ended = await afterMove(player);
          if(ended) return;
          await continueMove();
        }

        function finishTurn() {
          reachableNodes = []; waitingForPlayerMove = false; waitingForPlayerRoll = false; updateDiceButtonState();
          const player = getCurrentPlayer();
          if(player.completed.length >= TOTAL_CITIES) { gameOver=true; hideDice(); updateUI(); return; }
          switchPlayer();
        }

        function switchPlayer() { if(gameOver) return; currentPlayerIndex = (currentPlayerIndex + 1) % 3; updateUI(); handleTurn(); }

        async function decideFirstPlayer() {
  const off = getBoardOffset();
  diceContainer.style.left = off.left + 400 - 21 + "px";
  diceContainer.style.top = off.top + 300 - 55 + "px";
  diceContainer.style.display = "block";

  // --- 玩家0（你）掷骰子 ---
  currentPlayerIndex = 0;
  updateUI();
  firstRollResolve = null;
  const rollP = new Promise(r => { firstRollResolve = r; });
  updateDiceButtonState();
  const pRoll = await rollP;
  await sleep(800);
  hideDice();

  // --- 玩家1（电脑1）掷骰子 ---
  currentPlayerIndex = 1;
  updateUI();
  diceContainer.style.display = "block";
  const a1Roll = await rollDiceAnimation();
  await sleep(800);
  hideDice();

  // --- 玩家2（电脑2）掷骰子 ---
  currentPlayerIndex = 2;
  updateUI();
  diceContainer.style.display = "block";
  const a2Roll = await rollDiceAnimation();
  await sleep(800);
  hideDice();

  const rolls = [
    { i: 0, v: pRoll },
    { i: 1, v: a1Roll },
    { i: 2, v: a2Roll },
  ];
  rolls.sort((a, b) => b.v - a.v);
  if (rolls[0].v === rolls[1].v) {
    await sleep(800);
    return decideFirstPlayer();
  }
  currentPlayerIndex = rolls[0].i;
  updateUI();
  await sleep(800);
  handleTurn();
}

        function resetGame() {
          if(isRolling||isMoving) return;
          resetQuestions(); // 重置题库
          modalOverlay.classList.add("hidden"); modalActive=false;
          selectingTargetPlayer = false; selectingCity = false;
          targetPlayerResolve = null; cityResolve = null;
          initPlayers(); decideFirstPlayer();
        }

        // 切换背景图按钮
        btnSwitchBg.addEventListener("click", () => {
          currentBgIndex = (currentBgIndex + 1) % bgImages.length;
          backgroundImagePath = bgImages[currentBgIndex];
          loadBackgroundImage(backgroundImagePath);
        });

        // ------------------ 移动端强制横屏自适应（弹窗移入容器） ------------------
        function adaptForMobile() {
          const vw = window.innerWidth;
          const vh = window.innerHeight;
          const isPortrait = vw < vh;
          const isNarrow = vw < 900;

          if (isNarrow && isPortrait) {
            window.isRotated = true;
            const containerWidth = 1060 + 32;
            const containerHeight = 600 + 32 + 12;
            const scaleX = vh / containerWidth;
            const scaleY = vw / containerHeight;
            const scale = Math.min(scaleX, scaleY, 1);
            gameContainer.style.transform = `rotate(90deg) scale(${scale})`;
            gameContainer.style.transformOrigin = 'center center';
            gameContainer.style.position = 'absolute';
            gameContainer.style.left = '50%';
            gameContainer.style.top = '50%';
            gameContainer.style.margin = '0';
            gameContainer.style.translate = '-50% -50%';

            if (modalOverlay.parentNode !== gameContainer) {
              gameContainer.appendChild(modalOverlay);
            }
            modalOverlay.style.position = 'absolute';
            modalOverlay.style.width = '100%';
            modalOverlay.style.height = '100%';
            modalOverlay.style.top = '0';
            modalOverlay.style.left = '0';
            modalBox.style.maxWidth = '340px';
            modalBox.style.fontSize = '0.85em';
            modalBox.style.padding = '14px 18px';
          } else {
            window.isRotated = false;
            gameContainer.style.transform = '';
            gameContainer.style.transformOrigin = '';
            gameContainer.style.position = '';
            gameContainer.style.left = '';
            gameContainer.style.top = '';
            gameContainer.style.margin = '0 auto';
            gameContainer.style.translate = '';

            if (modalOverlay.parentNode !== document.body) {
              document.body.appendChild(modalOverlay);
            }
            modalOverlay.style.position = 'fixed';
            modalOverlay.style.width = '100%';
            modalOverlay.style.height = '100%';
            modalOverlay.style.top = '0';
            modalOverlay.style.left = '0';
            modalBox.style.maxWidth = '';
            modalBox.style.fontSize = '';
            modalBox.style.padding = '';
          }
        }

        window.addEventListener('resize', adaptForMobile);
        window.addEventListener('orientationchange', () => setTimeout(adaptForMobile, 100));
        adaptForMobile();

        gameCanvas.addEventListener("touchstart", onCanvasInteraction, { passive: false });
        gameCanvas.addEventListener("touchend", onCanvasInteraction, { passive: false });
        gameCanvas.addEventListener("click", onCanvasInteraction);
        diceContainer.addEventListener("click", async () => {
          if(isRolling||isMoving||gameOver||modalActive||selectingTargetPlayer||selectingCity) return;
          if(btnRollDice.classList.contains("disabled")) return;
          if(firstRollResolve) { const val=await rollDiceAnimation(); await sleep(800); hideDice(); firstRollResolve(val); firstRollResolve=null; updateDiceButtonState(); return; }
          if(!waitingForPlayerRoll || isCurrentAI()) return;
          handleRollDice();
        });
        btnRollDice.addEventListener("click", () => diceContainer.click());
        btnReset.addEventListener("click", resetGame);
        document.addEventListener("keydown", e => { if(e.key===" "){ e.preventDefault(); if(!modalActive && !selectingTargetPlayer && !selectingCity) diceContainer.click(); } });

        let lastTimestamp = 0;
        function renderLoop(timestamp) {
          if (!lastTimestamp) lastTimestamp = timestamp;
          const delta = timestamp - lastTimestamp;
          lastTimestamp = timestamp;
          updateFloatingTexts(delta);
          if (needsRedraw) { drawBoard(); needsRedraw = false; }
          stopRafIfIdle();
          if (rafRunning) requestAnimationFrame(renderLoop);
        }

        buildDistMatrix();
        drawStaticCache();
        loadBackgroundImage();
        resetQuestions(); // 首次加载初始化题库
        initPlayers();
        requestAnimationFrame(renderLoop);
        decideFirstPlayer();
      })();
    </script>
  </body>
</html>
